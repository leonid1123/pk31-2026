<!DOCTYPE html>
<html>

<head>
    <title>Flask app</title>
    <link rel="stylesheet" href={{ url_for('static', filename='w3.css') }}>
</head>

<body>
    <div class="w3-container">
        <table class="w3-table w3-striped">
            <tr>
                <th>Модель</th>
                <th>Производитель</th>
                <th>Цена, руб.</th>
            </tr>
        {%for item in ans %}
            <tr>
            {%for proc_stat in item %}
                <td>
                {{proc_stat}}
                </td>
            {%endfor%}
            </tr>
        {% endfor%}
        </table>
        <form method="POST">
            <button name="sort_down" class="w3-btn">Сначала дешевые</button>
            <button name="sort_up" class="w3-btn">Сначала дорогие</button>
            <select class="w3-select" name="manufacturers">
                {% for item in man %}
                    <option value="{{item}}">{{item}}</option>
                {% endfor%}
            </select>
            <button name="filter" class="w3-btn">Выбрать производителя</button>
        </form>
    </div>
</body>

</html>
