<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Flask app</title>
    <link rel="stylesheet" href={{url_for('static', filename='w3.css' ) }}>
</head>
<body>
<div class="w3-bar w3-gray">
    <a class="w3-bar-item w3-button" href="/">На главную</a>
    <a class="w3-bar-item w3-button" href="/shop">В магазин</a>
</div>
<div class="w3-container w3-margin">
    {% for item in all_proc%}
    <div class="w3-card-4">
        <header class="w3-container w3-light-grey">
            <h3>Процессор:{{item[0]}}, производитель {{item[1]}}</h3>
        </header>
        <div class="w3-container">
            <p>{{item[2]}}руб.</p>
            <hr>
            <img src="{{url_for('static', filename='img/'+item[3] ) }}" alt="Avatar" class="w3-left w3-circle">
            <p>{{item[4]}}</p>
        </div>
        <button class="w3-button w3-block w3-dark-grey">В корзину</button>
    </div>
    {% endfor %}
</div>

</body>
</html>
